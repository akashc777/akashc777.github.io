baseurl: "/" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site, e.g. http://example.com

title: Akash Hadagali | Founder, Engineer, Builder
description: >- # this means to ignore newlines until "baseurl:"
  I'm Akash Hadagali — ex-Zomato SDE, GitHub Campus Expert, and founder of OneMana.
  I build things that help teams collaborate without paying per-seat SaaS tax every month.
  Currently shipping OneCamp: a self-hosted, open-source workspace with chat, tasks, docs, video calls, calendar and AI.

#################### Comment Section (Disqus) ################
disqus_shortname: "akash-hadagali" # Add your shortname for Disqus Comment. For example : mr-brown

# Scss Directory
sass:
  sass_dir: assets/scss
  style: compressed
  
# Build settings
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  auto_ids: true
  syntax_highlighter: rouge

permalink: pretty
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll/tagging
  - jemoji

paginate: 3
paginate_path: "/page/:num"


# include
include:
  - _pages
  - _authors

# Pages Path
defaults:
  - scope:
      path: '_pages'
    values:
      permalink: /:basename:output_ext

  - scope:
      path: '_authors'
    values:
      permalink: /about/:basename:output_ext
      layout: author

  - scope:
      path: ''
      type: "posts"
    values:
      permalink: post/:title:output_ext
      layout: post

# Tags
tag_page_dir:         tag
tag_page_layout:      tags
tag_permalink_style:  pretty


# Exclude from processing.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor